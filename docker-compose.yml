services:
  api-blue:
    build: ./todo-api

    environment:
      APP_VERSION: Blue

    expose:
      - "3000"

    env_file:
      - .env

    depends_on:
      - mongo

    volumes:
      - ./todo-api:/app
      - /app/node_modules

  api-green:
    build: ./todo-api

    environment:
      APP_VERSION: Green

    expose:
      - "3000"

    env_file:
      - .env

    depends_on:
      - mongo

    volumes:
      - ./todo-api:/app
      - /app/node_modules

  mongo:
    image: mongo:latest

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

  nginx:
    image: nginx:latest

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - api-blue
      - api-green

volumes:
  mongo-data: